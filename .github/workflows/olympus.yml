name: olympus

env:
  comando_script: node ./olympus_scraping.js
  archivo_feed: olympus_feed.json

concurrency:
  group: scraping
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ejecutar_script:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Clonar repositorio privado
        uses: actions/checkout@v6

      - name: Set up WireGuard
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
          NEEDRESTART_SUSPEND: 1
        uses: egor-tensin/setup-wireguard@v1
        with:
          endpoint: '${{ secrets.ENDPOINT }}'
          endpoint_public_key: '${{ secrets.PUBLIC_KEY }}'
          ips: '${{ secrets.ADDRESS }}'
          allowed_ips: '0.0.0.0/0, ::/0'
          private_key: '${{ secrets.PRIVATE_KEY }}'
          keepalive: '25'

      - name: Configurar Node.js
        uses: actions/setup-node@v5

      - name: Instalar dependencias
        run: |
          npm install --prefix /tmp/scraping puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
          npx puppeteer browsers install chrome

      - name: Ejecutar script
        run: |
          export NODE_PATH=/tmp/scraping/node_modules
          bash -c "$comando_script"

      - name: Configurar git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Subir cambios al repo
        run: |
          if git status --porcelain | grep -q .; then
            git add --all
            git commit -m "Actualizado: $archivo_feed"
            git push origin main
          else
            echo "Sin cambios"
          fi
